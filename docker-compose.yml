services:
  ollama:
    image: ollama/ollama:0.5.0
    container_name: cyberstudy-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # GPU section removed for Windows/WSL2 compatibility (CPU mode)
    # Uncomment the block below only after NVIDIA drivers + Container Toolkit are set up

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cyberstudy-backend
    depends_on:
      - ollama
    environment:
      - DATA_PATH=/app/backend/data/docs
      - DB_PATH=/app/backend/data/chroma
      - EMBED_MODEL=mxbai-embed-large
      - LLM_MODEL=llama3.2
      - OLLAMA_HOST=http://ollama:11434
      - API_KEY=supersecretkey_change_this_in_production_2026   # ← change in .env
    volumes:
      - ./backend/data:/app/backend/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cyberstudy-frontend
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
      - API_KEY=supersecretkey_change_this_in_production_2026   # ← change in .env
    ports:
      - "8501:8501"
    restart: unless-stopped

volumes:
  ollama_data: